<!DOCTYPE html>
<html>
<head>
  <title>WASM Font Family Sample</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta viewport="width=device-width,initial-scale=1.0,minimum-scale=1.0">
  <link rel="stylesheet" href="./css/fps.css">
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
    }

    main {
      display: grid;
      gap: 12px;
    }

    .controls {
      display: grid;
      gap: 8px;
      max-width: 1280px;
    }

    .controls label {
      display: grid;
      gap: 4px;
    }

    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    textarea,
    input,
    select,
    button {
      font: inherit;
      padding: 8px;
    }

    #summary {
      min-height: 1.5em;
      white-space: pre-wrap;
    }

    canvas {
      border: 1px solid #999;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
<header>
  <h1>フォントファミリーサンプル</h1>
  <p>`wasm-pack build -t web --features font` 後に利用してください。</p>
</header>
<main>
  <div class="controls">
    <label>
      Family Name
      <input id="family-name" type="text" value="Fira Sans" placeholder="Fira Sans">
    </label>
    <label>
      Font URLs
      <textarea id="font-urls" rows="3" placeholder="./sample/FiraSans-Regular.ttf&#10;./sample/FiraSans-Black.ttf"></textarea>
    </label>
    <label>
      Font Files
      <input id="font-files" type="file" accept=".ttf,.otf,.ttc,.woff,.woff2" multiple>
    </label>
    <label>
      Text
      <textarea id="font-text" rows="6">FontFamily feature test
ABCDEFGHIJKLM
NOPQRSTUVWXYZ
abc def ghi jkl

The quick brown fox jumps over the lazy dog.
Ligature: fi ffi if

CJK:
「王様は、人を殺します。」
「なぜ殺すのだ。」

項籍者，下相人也，字羽。初起時，年二十四。

高祖，沛丰邑中阳里人，姓刘氏，字季。

태조실록1권, 태조 1년 7월 17일 병신 1/2 기사 / 1392년 명 홍무(洪武) 25년

태조가 백관의 추대를 받아 수창궁에서 왕위에 오르다

EMOJI:
☹ 🥺 🤖 🐦 👮‍♀️👮‍♂️👮
</textarea>
    </label>
    <div class="grid">
      <label>
        Face Name
        <input id="font-name" type="text" placeholder="Optional face name">
      </label>
      <label>
        Font Size
        <input id="font-size" type="number" min="8" max="256" step="1" value="48">
      </label>
      <label>
        Weight
        <input id="font-weight" type="number" min="100" max="900" step="100" value="400">
      </label>
      <label>
        Style
        <select id="font-style">
          <option value="normal" selected>normal</option>
          <option value="italic">italic</option>
          <option value="oblique">oblique</option>
        </select>
      </label>
      <label>
        Stretch
        <input id="font-stretch" type="number" min="0.25" max="4" step="0.05" value="1">
      </label>
    </div>
    <div class="actions">
      <button id="load-family" type="button">Load Family</button>
      <button id="render-family" type="button">Render</button>
    </div>
  </div>
  <div id="summary"></div>
  <div id="fps"></div>
  <canvas id="canvas" width="1280" height="960"></canvas>
  <script type="module" src="./js/fontfamily.js"></script>
</main>
</body>
</html>
