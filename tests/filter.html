<!DOCTYPE html>
<html>
<head>
  <title>WASMサンプル</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="/css/default.css">
</head>
<header>
  <script src="/js/default.js"></script>
  <a name="header" class="dummy"></a>
</header>

<body>
<main>
  <div>
    <div><label for="upload">アップロード</label> <input type="file" id="upload"></div>
    <div>もしくは枠内に画像をドラッグ＆ドロップしてください</div>
    <div>jpeg, gif, png, tiff, bmp, magに対応</div>
     <div><canvas id="canvas" width="512" height="512" style="border: double gray 4px;"></canvas></div>
     <div>出力</div>
    <span>使うフィルタ</span>
    <p><select id="filter_name">
      <option value="sharpness">シャープネス</option>
      <option value="erode">エロード</option>
      <option value="dilate">拡張</option>
      <option value="smooth">スムース(smooth)</option>
      <option value="blur">ぼかし(blur)</option>
      <option value="shadow">シャドウ</option>
      <option value="edgeX">エッジX（ソーベルX）</option>
      <option value="edgeY">エッジY（ソーベルY）</option>
      <option value="canny">Canny</option>
      <option value="gaussian">ガウシアン</option>
      <option value="laplacian">ラプラシアン4</option>
      <option value="laplacian8">ラプラシアン8</option>     
      <option value="emboss">エンボス</option>
      <option value="outline">アウトライン</option>
      <option value="median">メディアン</option>
      <option value="average">平均</option>
      <option value="grayscale">グレイスケール</option>
    </select></p>  
  <div><canvas id="canvas2" width="512" height="512" style="border: double gray 4px  4px 4px 4px;"></canvas></div>
  <div><button id="saver">保存</button></div>
  </div>
  
  <script type="module" src="./js/filter.js"></script>
</main>
<footer>
<div class="goback"><a href="../index.html" class="back">戻る</a></div>
<div class="gotop"><a href="#header"></a></div>
</footer>
</body>
</html>
